<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AMVUTTRA® (vutrisiran) — Product Dossier | NewBridge Pharmaceuticals</title>
    <meta name="description" content="AMVUTTRA (vutrisiran) — The first and only FDA-approved RNAi therapy for both ATTR-CM and hATTR-PN. Comprehensive product dossier for NewBridge Pharmaceuticals." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <!-- Chart.js loaded from CDN; onerror sets window.__chartJsFailed so EvidenceSection can show a static fallback -->
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
      onerror="window.__chartJsFailed = true; console.warn('Chart.js CDN failed to load — evidence charts will show static fallback.');"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Umami analytics — injected dynamically via import.meta.env.
         Set VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID
         in your Vercel environment variables to enable tracking. -->
    <script type="module">
      const ep = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const id = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;
      if (ep && id) {
        const s = document.createElement("script");
        s.defer = true;
        s.src = ep + "/umami";
        s.setAttribute("data-website-id", id);
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
